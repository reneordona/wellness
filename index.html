<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@300;400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
}

/* The slide is always 1920x1080 internally, scaled to fit the screen */
#stage {
  width: 1920px;
  height: 1080px;
  position: absolute;
  top: 0; left: 0;
  transform-origin: top left;
  background: #0b1e2d;
  font-family: 'Cabinet Grotesk', sans-serif;
  overflow: hidden;
}

:root {
  --cyan:   #05c3de;
  --coral:  #ff6b6b;
  --amber:  #ffc454;
  --mint:   #4ecdc4;
  --violet: #a78bfa;
  --rose:   #fb7185;
}

.bg-layer {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 110% 50%, rgba(5,195,222,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 80% at -10% 80%, rgba(167,139,250,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 50% -10%, rgba(255,196,84,0.05) 0%, transparent 50%);
}
.grid-lines {
  position: absolute; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 80px 80px;
}
.deco-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(5,195,222,0.1);
  z-index: 0;
}
.ring1 { width:700px; height:700px; top:50%; left:50%; transform:translate(-50%,-50%); }
.ring2 { width:920px; height:920px; top:50%; left:50%; transform:translate(-50%,-50%); border-color:rgba(5,195,222,0.05); }

.layout {
  position: relative; z-index: 2;
  width: 100%; height: 100%;
  display: grid;
  grid-template-columns: 300px 1fr 320px;
}

/* LEFT */
.col-left {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 52px 40px 52px 56px;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.logo {
  display: flex;
  justify-content: center;
}
.logo img {
  width: 130px;
  filter: brightness(0) invert(1);
  opacity: 0.8;
}
.left-mid { display:flex; flex-direction:column; gap:28px; }
.wellness-label {
  font-size: 10px; font-weight:700; letter-spacing:3.5px;
  text-transform:uppercase; color:var(--cyan);
}
.left-title {
  font-family:'Instrument Serif',serif;
  font-size:44px; font-weight:400; line-height:1.1; color:#fff;
}
.left-title span { display:block; font-style:italic; color:var(--cyan); }
.left-desc {
  font-size:15px; font-weight:300;
  color:rgba(255,255,255,0.4); line-height:1.65;
}
.cat-chip {
  display:inline-flex; align-items:center; gap:9px;
  padding:10px 18px; border-radius:50px; font-size:14px; font-weight:600;
  border:1.5px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06); color:#fff; width:fit-content;
  transition:border-color 0.6s, color 0.6s;
}
.cat-chip i { font-size:17px; transition:color 0.6s; }
.dot-cluster { display:flex; flex-wrap:wrap; gap:7px; max-width:200px; }
.dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(255,255,255,0.15); transition:all 0.4s;
}
.dot.active { background:var(--cyan); transform:scale(1.6); }
.dot.done   { background:rgba(255,255,255,0.38); }

/* CENTER */
.col-center {
  display:flex; flex-direction:column; justify-content:center;
  padding:80px 80px 80px 72px; position:relative;
}
.tip-watermark {
  position:absolute; top:30px; right:60px;
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:180px; font-weight:800;
  color:rgba(255,255,255,0.03); line-height:1;
  letter-spacing:-6px; pointer-events:none;
}
.tip-content { transition:opacity 0.45s ease, transform 0.45s ease; }
.tip-content.out { opacity:0; transform:translateY(-16px); }
.tip-content.in  { opacity:0; transform:translateY(16px); }
.tip-eyebrow { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
.eyebrow-bar {
  width:28px; height:2px; border-radius:2px;
  background:var(--cyan); transition:background 0.6s;
}
.eyebrow-text {
  font-size:11px; font-weight:700; letter-spacing:3px;
  text-transform:uppercase; color:rgba(255,255,255,0.4);
}
.tip-headline {
  font-family:'Instrument Serif',serif;
  font-size:64px; font-weight:400; line-height:1.1;
  color:#fff; margin-bottom:32px; max-width:880px;
}
.tip-headline em { font-style:italic; transition:color 0.6s; }
.h-rule {
  width:48px; height:3px; border-radius:3px;
  background:var(--cyan); margin-bottom:28px; transition:background 0.6s;
}
.tip-body {
  font-size:22px; font-weight:300;
  color:rgba(255,255,255,0.65); line-height:1.7; max-width:800px;
}
.tip-body strong { font-weight:600; color:rgba(255,255,255,0.9); }

/* RIGHT */
.col-right {
  display:flex; flex-direction:column; justify-content:space-between;
  padding:52px 48px 52px 36px;
  border-left:1px solid rgba(255,255,255,0.06);
  gap:20px;
}
.icon-card {
  flex:1; border-radius:24px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:20px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  transition:background 0.6s, border-color 0.6s;
  position:relative; overflow:hidden;
}
.icon-card::before {
  content:''; position:absolute; inset:0; border-radius:24px;
  background:radial-gradient(ellipse at 50% 40%, var(--card-glow, rgba(5,195,222,0.12)) 0%, transparent 70%);
  transition:background 0.6s;
}
.icon-card i { font-size:72px; color:var(--cyan); transition:color 0.6s; position:relative; z-index:1; }
.icon-card-label {
  font-family:'Instrument Serif',serif; font-size:20px;
  font-style:italic; color:rgba(255,255,255,0.6);
  position:relative; z-index:1;
}
.stat-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.stat-chip {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px; padding:18px 16px;
  display:flex; flex-direction:column; gap:6px;
}
.stat-chip-val {
  font-size:28px; font-weight:800;
  color:var(--cyan); line-height:1; transition:color 0.6s;
}
.stat-chip-label {
  font-size:11px; font-weight:500;
  color:rgba(255,255,255,0.35); letter-spacing:0.5px;
}

/* PROGRESS BAR */
.prog-bar-wrap {
  position:absolute; bottom:0; left:0; right:0;
  height:3px; background:rgba(255,255,255,0.07); z-index:10;
}
.prog-bar-fill {
  height:100%; background:var(--cyan); width:0%;
  transition:width linear, background 0.6s;
}
</style>
</head>
<body>

<div id="stage">
  <div class="bg-layer"></div>
  <div class="grid-lines"></div>
  <div class="deco-ring ring1"></div>
  <div class="deco-ring ring2"></div>

  <div class="layout">
    <div class="col-left">
      <div class="logo">
        <img src="https://raw.githubusercontent.com/reneordona/ha_elevator/main/Housing%20Authority%20Logo%20-%20Portrait%20Version-300dpi%20for%20Print-WHITE.png" alt="HACLB">
      </div>
      <div class="left-mid">
        <div class="wellness-label">Staff Wellness</div>
        <div class="left-title">Feel your<span>best.</span></div>
        <div class="left-desc">Small daily habits that make a real difference — at work and beyond.</div>
        <div class="cat-chip" id="catChip">
          <i id="chipIcon" class="ph ph-leaf"></i>
          <span id="chipLabel">Loading</span>
        </div>
      </div>
      <div class="dot-cluster" id="dotCluster"></div>
    </div>

    <div class="col-center">
      <div class="tip-watermark" id="tipWatermark">01</div>
      <div class="tip-content" id="tipContent">
        <div class="tip-eyebrow">
          <div class="eyebrow-bar" id="eyebrowBar"></div>
          <div class="eyebrow-text" id="eyebrowText">Tip</div>
        </div>
        <div class="tip-headline" id="tipHeadline">Loading...</div>
        <div class="h-rule" id="hRule"></div>
        <div class="tip-body" id="tipBody">Loading...</div>
      </div>
      <div class="prog-bar-wrap">
        <div class="prog-bar-fill" id="progFill"></div>
      </div>
    </div>

    <div class="col-right">
      <div class="icon-card" id="iconCard">
        <i id="cardIcon" class="ph ph-plant"></i>
        <div class="icon-card-label" id="cardLabel">Wellness</div>
      </div>
      <div class="stat-row">
        <div class="stat-chip">
          <div class="stat-chip-val" id="statNum">01</div>
          <div class="stat-chip-label">Current tip</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val">18</div>
          <div class="stat-chip-label">Total tips</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Scale stage to always fill the viewport at 16:9 ── */
function scaleStage() {
  const stage = document.getElementById('stage');
  const scaleX = window.innerWidth  / 1920;
  const scaleY = window.innerHeight / 1080;
  const scale  = Math.min(scaleX, scaleY);
  const offsetX = (window.innerWidth  - 1920 * scale) / 2;
  const offsetY = (window.innerHeight - 1080 * scale) / 2;
  stage.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
}
scaleStage();
window.addEventListener('resize', scaleStage);

/* ── Tip data ── */
const ACCENTS = {
  cyan:   { color:'#05c3de', glow:'rgba(5,195,222,0.14)' },
  coral:  { color:'#ff6b6b', glow:'rgba(255,107,107,0.14)' },
  amber:  { color:'#ffc454', glow:'rgba(255,196,84,0.14)' },
  mint:   { color:'#4ecdc4', glow:'rgba(78,205,196,0.14)' },
  violet: { color:'#a78bfa', glow:'rgba(167,139,250,0.14)' },
  rose:   { color:'#fb7185', glow:'rgba(251,113,133,0.14)' },
};

const tips = [
  { theme:'cyan',   cat:'Micro break',   eyebrow:'Take a pause',       icon:'ph-coffee',             headline:'Step away — your brain <em>needs it</em>',                    body:'Every 90 minutes, your brain naturally craves a reset. <strong>Walk to grab water, look out a window, or just stand up and stretch.</strong> Stepping away makes you sharper when you come back.' },
  { theme:'coral',  cat:'Stretching',    eyebrow:'Move your body',     icon:'ph-person-simple-walk', headline:'Your shoulders are <em>tighter than you think</em>',            body:'Roll your shoulders back slowly 5 times, then tilt your head gently side to side. <strong>Hold each side for 10 seconds.</strong> You can do this right at your desk — no equipment needed.' },
  { theme:'amber',  cat:'Eye health',    eyebrow:'Screen care',        icon:'ph-eye',                headline:'The <em>20-20-20 rule</em> actually works',                     body:'Every 20 minutes, focus on something 20 feet away for 20 seconds. <strong>It significantly reduces eye muscle fatigue</strong> and keeps those afternoon headaches from showing up.' },
  { theme:'mint',   cat:'Hydration',     eyebrow:'Drink up',           icon:'ph-drop',               headline:'You\'re probably <em>more dehydrated</em> than you realize',   body:'Even mild dehydration causes fatigue and brain fog. <strong>Keep a water bottle at your desk and sip every 30 minutes.</strong> Your energy stays more consistent all day.' },
  { theme:'violet', cat:'Stress relief', eyebrow:'Regulate',           icon:'ph-wind',               headline:'Box breathing <em>calms you down fast</em>',                   body:'Breathe in for 4 counts, hold 4, out 4, hold 4. Repeat 3–4 times. <strong>It activates your body\'s natural calm response</strong> — no apps, no equipment, under two minutes.' },
  { theme:'cyan',   cat:'Posture',       eyebrow:'Body care',          icon:'ph-office-chair',       headline:'Check in with <em>your back right now</em>',                   body:'<strong>Sit all the way back so your lower back is fully supported</strong>, feet flat, screen at eye level. Two seconds to fix it now saves you from hours of stiffness later.' },
  { theme:'rose',   cat:'Mental health', eyebrow:'Emotional wellness', icon:'ph-brain',              headline:'Name it — <em>and it loses power</em>',                        body:'Labeling your emotions — "I\'m anxious," "I\'m overwhelmed" — has been shown to reduce their intensity. <strong>One of the smallest habits with one of the biggest payoffs.</strong>' },
  { theme:'amber',  cat:'Movement',      eyebrow:'Light activity',     icon:'ph-sneaker-move',       headline:'Take the <em>long way around</em>',                            body:'Skip the nearest restroom or elevator — take the longer route instead. <strong>Those extra steps add up fast</strong> and mid-day movement genuinely shifts your energy and mood.' },
  { theme:'mint',   cat:'Stress relief', eyebrow:'Release tension',    icon:'ph-leaf',               headline:'Tense everything up — <em>then let it all go</em>',            body:'Squeeze a muscle group tightly for 5 seconds, then release completely. Start at your toes and work upward. <strong>You\'ll uncover tension you didn\'t know you were holding.</strong>' },
  { theme:'violet', cat:'Sleep',         eyebrow:'Rest better',        icon:'ph-moon',               headline:'The hour before bed <em>sets the whole night up</em>',         body:'Dim your lights and step away from screens to signal wind-down time. <strong>Even 30 minutes makes a measurable difference</strong> in sleep quality and how you feel tomorrow.' },
  { theme:'cyan',   cat:'Connection',    eyebrow:'Social wellness',    icon:'ph-chat-circle-dots',   headline:'A quick check-in <em>matters more than you think</em>',        body:'A two-minute "how\'s your day going?" can <strong>genuinely boost your mood and reduce feelings of isolation.</strong> Real connection doesn\'t need to be deep — it just needs to happen.' },
  { theme:'coral',  cat:'Nutrition',     eyebrow:'Fuel right',         icon:'ph-apple',              headline:'Reach for something <em>real</em> this afternoon',             body:'Fruit, nuts, or yogurt give you steady energy instead of a spike and crash. <strong>When the 2pm slump hits, what you reach for genuinely matters.</strong> Your body will feel the difference.' },
  { theme:'amber',  cat:'Focus',         eyebrow:'Work smarter',       icon:'ph-target',             headline:'Three things. <em>Just three.</em>',                           body:'Instead of an overwhelming list, <strong>pick the 3 things that truly matter today.</strong> When those are done, everything else is a bonus. Less stress, more satisfaction.' },
  { theme:'mint',   cat:'Wrist care',    eyebrow:'Stretch',            icon:'ph-hand-waving',        headline:'Your wrists are <em>working overtime</em>',                    body:'Extend one arm out, gently bend the hand back, hold 15 seconds. Then switch. <strong>Do this a few times throughout the day</strong> — it prevents strain that builds up quietly from typing.' },
  { theme:'violet', cat:'Mindfulness',   eyebrow:'One minute reset',   icon:'ph-sparkle',            headline:'Sixty seconds. <em>Eyes closed. Just breathe.</em>',           body:'Set a timer for one minute. Close your eyes and notice your breathing — in and out, without changing anything. <strong>That one minute of stillness can reset your mood</strong> more than you\'d expect.' },
  { theme:'cyan',   cat:'Micro break',   eyebrow:'Get up',             icon:'ph-arrow-fat-up',       headline:'Stand up — <em>right now, seriously</em>',                     body:'Long stretches of sitting increase fatigue and stiffness more than most people realize. <strong>Standing for just 2 minutes gets your blood moving.</strong> Do a few calf raises while you\'re at it.' },
  { theme:'rose',   cat:'Boundaries',    eyebrow:'Protect your energy',icon:'ph-shield-check',       headline:'Saying no <em>is a complete sentence</em>',                    body:'Setting limits on your time and energy isn\'t selfish — it\'s healthy. <strong>"I can\'t take that on right now" is enough.</strong> Protecting your bandwidth protects the quality of your work.' },
  { theme:'amber',  cat:'Screen health', eyebrow:'Easy on the eyes',   icon:'ph-monitor',            headline:'Your screen is probably <em>way too bright</em>',              body:'If your screen is brighter than the room around you, your eyes are straining all day. <strong>Match your brightness to your environment</strong> and you\'ll notice less fatigue by end of day.' },
];

const INTERVAL = 9000;
const STORAGE_KEY = 'haclb_wellness_tip';
let current = 0;
let timer = null;

function getSavedTip() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return 0;
    const data = JSON.parse(raw);
    const now = Date.now();
    const elapsed = now - data.savedAt;
    const stepsElapsed = Math.floor(elapsed / INTERVAL);
    return (data.index + stepsElapsed) % tips.length;
  } catch(e) {
    return 0;
  }
}

function saveTip(idx) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ index: idx, savedAt: Date.now() }));
  } catch(e) {}
}

function buildDots() {
  const wrap = document.getElementById('dotCluster');
  wrap.innerHTML = '';
  tips.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    wrap.appendChild(d);
  });
}

function updateDots(idx) {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i === idx ? ' active' : i < idx ? ' done' : '');
  });
}

function applyTheme(themeName) {
  const a = ACCENTS[themeName];
  const c = a.color;
  document.getElementById('progFill').style.background = c;
  document.getElementById('eyebrowBar').style.background = c;
  document.getElementById('hRule').style.background = c;
  document.getElementById('catChip').style.borderColor = c + '55';
  document.getElementById('chipIcon').style.color = c;
  document.querySelector('.wellness-label').style.color = c;
  document.querySelector('.left-title span').style.color = c;
  document.getElementById('cardIcon').style.color = c;
  document.getElementById('iconCard').style.cssText += '; --card-glow:' + a.glow;
  document.querySelectorAll('.stat-chip-val').forEach(el => el.style.color = c);
  document.querySelectorAll('#tipHeadline em').forEach(el => el.style.color = c);
}

function startBar() {
  const fill = document.getElementById('progFill');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.transition = 'width ' + INTERVAL + 'ms linear, background 0.6s';
    fill.style.width = '100%';
  }));
}

function showTip(idx, save) {
  const content = document.getElementById('tipContent');
  content.classList.add('out');
  setTimeout(function() {
    const t = tips[idx];
    document.getElementById('tipHeadline').innerHTML = t.headline;
    document.getElementById('tipBody').innerHTML = t.body;
    document.getElementById('eyebrowText').textContent = t.eyebrow;
    document.getElementById('chipLabel').textContent = t.cat;
    document.getElementById('cardLabel').textContent = t.cat;
    document.getElementById('tipWatermark').textContent = String(idx + 1).padStart(2, '0');
    document.getElementById('statNum').textContent = String(idx + 1).padStart(2, '0');
    ['chipIcon','cardIcon'].forEach(id => {
      document.getElementById(id).className = 'ph ' + t.icon;
    });
    applyTheme(t.theme);
    updateDots(idx);
    startBar();
    if (save !== false) saveTip(idx);
    content.classList.remove('out');
    content.classList.add('in');
    requestAnimationFrame(() => requestAnimationFrame(() => content.classList.remove('in')));
  }, 400);
}

buildDots();
current = getSavedTip();
showTip(current);
timer = setInterval(function() {
  current = (current + 1) % tips.length;
  showTip(current);
}, INTERVAL);
</script>
</body>
</html>
