<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { width:100%; height:100%; overflow:hidden; background:#000; margin:0; padding:0; }
body { width:100%; height:100%; overflow:hidden; background:#000; margin:0; padding:0; display:flex; align-items:center; justify-content:center; }

#stage {
  width:1920px; height:1080px;
  position:relative;
  flex-shrink:0;
  transform-origin:center center;
  overflow:hidden;
  font-family:'Patrick Hand', cursive;
  background-color:#2a4a2e;
  background-image:
    repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
    repeating-linear-gradient(90deg, transparent, transparent 3px, rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 6px),
    radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.015) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.06) 0%, transparent 50%);
}

/* Vignette */
.vignette {
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background:radial-gradient(ellipse 85% 75% at 52% 50%, rgba(255,255,255,0.04) 0%, transparent 55%, rgba(0,0,0,0.22) 100%);
}

/* Erase smear layer */
.erase-smear {
  position:absolute; inset:28px; z-index:1; pointer-events:none;
}

.frame-top    { position:absolute; top:0;    left:0; right:0;  height:28px; background:linear-gradient(to bottom, #6b3a1f, #8b5a2b, #6b3a1f); z-index:10; box-shadow:inset 0 -2px 4px rgba(0,0,0,0.4); }
.frame-bottom { position:absolute; bottom:0; left:0; right:0;  height:28px; background:linear-gradient(to top,    #6b3a1f, #8b5a2b, #6b3a1f); z-index:10; box-shadow:inset 0 2px 4px rgba(0,0,0,0.4); }
.frame-left   { position:absolute; top:0; bottom:0; left:0;   width:28px;  background:linear-gradient(to right,  #6b3a1f, #8b5a2b, #6b3a1f); z-index:10; box-shadow:inset -2px 0 4px rgba(0,0,0,0.4); }
.frame-right  { position:absolute; top:0; bottom:0; right:0;  width:28px;  background:linear-gradient(to left,   #6b3a1f, #8b5a2b, #6b3a1f); z-index:10; box-shadow:inset 2px 0 4px rgba(0,0,0,0.4); }
.corner { position:absolute; width:40px; height:40px; z-index:11; background:#4a2810; border-radius:2px; }
.corner.tl { top:0; left:0; } .corner.tr { top:0; right:0; }
.corner.bl { bottom:0; left:0; } .corner.br { bottom:0; right:0; }

.chalk-ledge { position:absolute; bottom:28px; left:28px; right:28px; height:6px; z-index:9; background:rgba(255,255,255,0.06); border-radius:2px; }

.ruled-lines {
  position:absolute; inset:28px; z-index:1;
  background-image:repeating-linear-gradient(to bottom, transparent, transparent 79px, rgba(255,255,255,0.04) 79px, rgba(255,255,255,0.04) 80px);
}

.chalk-div-left {
  position:absolute; top:28px; bottom:28px; left:328px; width:2px; z-index:3;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.22) 0px, rgba(255,255,255,0.22) 8px, transparent 8px, transparent 14px);
}
.chalk-div-right {
  position:absolute; top:28px; bottom:28px; right:288px; width:2px; z-index:3;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.22) 0px, rgba(255,255,255,0.22) 8px, transparent 8px, transparent 14px);
}

.layout { position:absolute; inset:28px; z-index:2; display:grid; grid-template-columns:260px 1fr 260px; }

/* LEFT */
.col-left { display:flex; flex-direction:column; justify-content:space-between; padding:44px 32px 44px 40px; }
.logo-wrap { display:flex; justify-content:center; }
.logo-wrap img { width:120px; filter:brightness(0) invert(1); opacity:0.55; }
.left-mid { display:flex; flex-direction:column; gap:20px; }
.chalk-label { font-family:'Caveat',cursive; font-size:20px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.5); }
.left-title { font-family:'Caveat',cursive; font-size:68px; font-weight:700; line-height:1.05; color:rgba(255,255,255,0.88); text-shadow:1px 1px 0 rgba(0,0,0,0.3); }
.left-title em { font-style:normal; color:#a8e6a8; transition:color 0.7s; text-decoration:underline; text-decoration-color:rgba(168,230,168,0.35); text-underline-offset:4px; }
.left-sub { font-size:22px; color:rgba(255,255,255,0.42); line-height:1.6; }
.cat-tag { display:inline-flex; align-items:center; gap:10px; padding:10px 18px; border-radius:4px; font-family:'Caveat',cursive; font-size:26px; font-weight:600; border:2px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.75); width:fit-content; transition:border-color 0.6s, color 0.6s; background:rgba(255,255,255,0.04); }
.cat-tag i { font-size:28px; transition:color 0.6s; }
.dot-row { display:flex; flex-wrap:wrap; gap:9px; max-width:210px; }
.dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.18); transition:all 0.4s; border:1px solid rgba(255,255,255,0.1); }
.dot.active { background:rgba(168,230,168,0.8); transform:scale(1.5); border-color:transparent; }
.dot.done { background:rgba(255,255,255,0.38); }

/* CENTER */
.col-center { display:flex; flex-direction:column; justify-content:center; padding:48px 80px 48px 80px; position:relative; }
.watermark { position:absolute; top:16px; right:40px; font-family:'Caveat',cursive; font-size:200px; font-weight:700; color:rgba(255,255,255,0.035); line-height:1; pointer-events:none; }
.tip-content { transition:opacity 0.5s ease, transform 0.5s ease; }
.tip-content.out { opacity:0; transform:translateY(-16px); }
.tip-content.in  { opacity:0; transform:translateY(16px); }
.eyebrow-row { display:flex; align-items:center; gap:14px; margin-bottom:22px; }
.chalk-dash { width:36px; height:3px; border-radius:2px; background:rgba(168,230,168,0.7); transition:background 0.6s, box-shadow 0.6s; }
.eyebrow-text { font-family:'Caveat',cursive; font-size:24px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.5); }
.headline { font-family:'Caveat',cursive; font-size:92px; font-weight:700; line-height:1.08; color:rgba(255,255,255,0.9); margin-bottom:20px; max-width:none; text-shadow:1px 1px 0 rgba(0,0,0,0.25); }
.headline em { font-style:normal; transition:color 0.6s, text-shadow 0.6s; }
.chalk-rule { width:52px; height:4px; border-radius:2px; background:rgba(168,230,168,0.65); margin-bottom:18px; transition:background 0.6s, box-shadow 0.6s; }
.body-text { font-size:30px; color:rgba(255,255,255,0.82); line-height:1.65; max-width:none; }
.body-text strong { font-weight:700; color:rgba(255,255,255,0.88); }

/* RIGHT */
.col-right { display:flex; flex-direction:column; padding:40px 40px 40px 36px; gap:16px; }
.icon-card { flex:1; border-radius:6px; background:rgba(255,255,255,0.03); border:2px solid rgba(255,255,255,0.14); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; position:relative; overflow:hidden; }
.icon-card::before, .icon-card::after { content:''; position:absolute; width:20px; height:20px; border-color:rgba(255,255,255,0.22); border-style:solid; }
.icon-card::before { top:10px; left:10px; border-width:2px 0 0 2px; }
.icon-card::after  { bottom:10px; right:10px; border-width:0 2px 2px 0; }
.icon-card i { font-size:100px; color:rgba(168,230,168,0.8); transition:color 0.6s, filter 0.6s; filter:drop-shadow(0 0 8px rgba(168,230,168,0.3)); }
.icon-card-cat { font-family:'Caveat',cursive; font-size:30px; font-weight:600; color:rgba(255,255,255,0.5); }
.chip-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.mini-chip { border-radius:4px; padding:18px 16px; background:rgba(255,255,255,0.03); border:2px solid rgba(255,255,255,0.12); display:flex; flex-direction:column; gap:5px; }
.mini-chip-val { font-family:'Caveat',cursive; font-size:44px; font-weight:700; color:rgba(168,230,168,0.85); line-height:1; transition:color 0.6s, text-shadow 0.6s; text-shadow:0 0 8px rgba(168,230,168,0.3); }
.mini-chip-lbl { font-size:18px; color:rgba(255,255,255,0.28); letter-spacing:.5px; }

.prog-wrap { position:absolute; bottom:36px; left:36px; right:36px; height:4px; background:rgba(255,255,255,0.07); z-index:10; border-radius:2px; }
.prog-fill { height:100%; background:rgba(168,230,168,0.65); width:0%; transition:width linear, background 0.7s; border-radius:2px; }

/* Did you know */
.dyk-row {
  display:flex; flex-direction:column; gap:6px;
  margin-top:20px;
  padding:16px 20px;
  border-radius:4px;
  background:rgba(255,255,255,0.04);
  border-left:3px solid rgba(168,230,168,0.5);
  max-width:none;
  transition:border-color 0.6s;
}
.dyk-label {
  font-family:'Caveat',cursive; font-size:22px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  color:rgba(168,230,168,0.7);
  transition:color 0.6s;
}
.dyk-text {
  font-size:22px; color:rgba(255,255,255,0.65); line-height:1.55;
  font-family:'Patrick Hand',cursive;
}
</style>
</head>
<body>
<div id="stage">
  <div class="frame-top"></div><div class="frame-bottom"></div>
  <div class="frame-left"></div><div class="frame-right"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="vignette"></div>
  <svg class="erase-smear" viewBox="0 0 1862 1024" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="rgba(255,255,255,0.055)" stroke-linecap="round">
      <path d="M 120 180 Q 280 170 440 185 Q 520 190 580 178" stroke-width="18"/>

      <path d="M 810 442 Q 900 432 1020 440 Q 1090 445 1140 436" stroke-width="12"/>

      <path d="M 1410 298 Q 1510 288 1630 296" stroke-width="9"/>
      <path d="M 300 700 Q 460 690 600 700 Q 660 705 700 696" stroke-width="20"/>
      <path d="M 310 718 Q 440 710 570 718" stroke-width="11"/>
      <path d="M 1100 820 Q 1220 810 1360 820 Q 1420 825 1460 815" stroke-width="14"/>
      <path d="M 1110 836 Q 1210 828 1330 835" stroke-width="8"/>
      <path d="M 600 120 Q 680 114 760 122" stroke-width="26" stroke="rgba(255,255,255,0.035)"/>
      <path d="M 610 148 Q 670 142 740 148" stroke-width="18" stroke="rgba(255,255,255,0.025)"/>
      <path d="M 1500 600 Q 1580 592 1660 600 Q 1700 605 1720 596" stroke-width="20" stroke="rgba(255,255,255,0.04)"/>
    </g>

  <div class="chalk-ledge"></div>

  <div class="chalk-div-left"></div>

  <div class="layout">
    <div class="col-left">
      <div class="logo-wrap">
        <img src="https://raw.githubusercontent.com/reneordona/ha_elevator/main/Housing%20Authority%20Logo%20-%20Portrait%20Version-300dpi%20for%20Print-WHITE.png" alt="HACLB">
      </div>

        <div class="chalk-label">Staff Wellness</div>
        <div class="left-title">Feel your<br><em id="leftEm">best.</em></div>
        <div class="left-sub">Small habits, big difference — tips to help you thrive at work and beyond.</div>
        <div class="cat-tag" id="catTag">
          <i id="chipIcon" class="ph ph-leaf"></i>

    <div class="col-center">
      <div class="watermark" id="watermark">01</div>

<script>
function scaleStage() {
  var s = document.getElementById('stage');
  var vw = document.documentElement.clientWidth  || window.innerWidth;
  var vh = document.documentElement.clientHeight || window.innerHeight;
  var scale = Math.min(vw/1920, vh/1080);
  s.style.transform = 'scale('+scale+')';
  s.style.transformOrigin = 'center center';
}
scaleStage();
window.addEventListener('resize', scaleStage);
window.addEventListener('load', scaleStage);
document.addEventListener('DOMContentLoaded', scaleStage);

var INTERVAL = 15000;
var STORAGE_KEY = 'haclb_wellness_tip';

var ACCENTS = {
  cyan:   { color:'#a8e6a8', glow:'rgba(168,230,168,0.3)' },
  coral:  { color:'#f4a7a7', glow:'rgba(244,167,167,0.3)' },
  amber:  { color:'#f7d58b', glow:'rgba(247,213,139,0.3)' },
  mint:   { color:'#a0e8df', glow:'rgba(160,232,223,0.3)' },
  violet: { color:'#c4b5fd', glow:'rgba(196,181,253,0.3)' },
  rose:   { color:'#fba8b4', glow:'rgba(251,168,180,0.3)' },
};

var tips = [
{ theme:'cyan',   cat:'Micro break',   eyebrow:'Take a pause',        icon:'ph-coffee',             headline:'Step away — your brain <em>needs it</em>',                    body:'Every 90 minutes, your brain naturally craves a reset. <strong>Walk to grab water, look out a window, or just stand up and stretch.</strong> Stepping away makes you sharper when you come back.',   fact:'Workers who take regular short breaks are up to 13% more productive than those who power through without stopping.' },
{ theme:'coral',  cat:'Stretching',    eyebrow:'Move your body',      icon:'ph-person-simple-walk', headline:'Your shoulders are <em>tighter than you think</em>',          body:'Roll your shoulders back slowly 5 times, then tilt your head gently side to side. <strong>Hold each side for 10 seconds.</strong> You can do this right at your desk — no equipment needed.',   fact:'Neck and shoulder tension is one of the top complaints among office workers — and most of it builds up silently over a single day.' },
{ theme:'amber',  cat:'Eye health',    eyebrow:'Screen care',         icon:'ph-eye',                headline:'The <em>20-20-20 rule</em> actually works',                   body:'Every 20 minutes, focus on something 20 feet away for 20 seconds. <strong>It significantly reduces eye muscle fatigue</strong> and keeps those afternoon headaches from showing up.',   fact:'The average office worker spends over 1,700 hours a year in front of a screen — making eye care one of the most important workplace habits.' },
{ theme:'mint',   cat:'Hydration',     eyebrow:'Drink up',            icon:'ph-drop',               headline:'You\'re probably <em>more dehydrated</em> than you realize',  body:'Even mild dehydration causes fatigue and brain fog. <strong>Keep a water bottle at your desk and sip every 30 minutes.</strong> Your energy stays more consistent all day.',   fact:'A drop of just 1-2% in body hydration is enough to impair concentration, short-term memory, and mood — all before you even feel thirsty.' },
{ theme:'violet', cat:'Stress relief', eyebrow:'Regulate',            icon:'ph-wind',               headline:'Box breathing <em>calms you down fast</em>',                  body:'Breathe in for 4 counts, hold 4, out 4, hold 4. Repeat 3–4 times. <strong>It activates your body\'s natural calm response</strong> — no apps, no equipment, under two minutes.',   fact:'Box breathing is used by Navy SEALs and ER doctors to stay calm under extreme pressure. If it works for them, it works for a stressful Tuesday.' },
{ theme:'cyan',   cat:'Posture',       eyebrow:'Body care',           icon:'ph-office-chair',       headline:'Check in with <em>your back right now</em>',                  body:'<strong>Sit all the way back so your lower back is fully supported</strong>, feet flat, screen at eye level. Two seconds to fix it now saves you from hours of stiffness later.',   fact:'Poor posture doesn\'t just cause back pain — it also reduces lung capacity by up to 30%, meaning less oxygen reaching your brain all day.' },
{ theme:'rose',   cat:'Mental health', eyebrow:'Emotional wellness',  icon:'ph-brain',              headline:'Name it — <em>and it loses power</em>',                       body:'Labeling your emotions — "I\'m anxious," "I\'m overwhelmed" — has been shown to reduce their intensity. <strong>One of the smallest habits with one of the biggest payoffs.</strong>',   fact:'This technique is called \'affect labeling\' — brain scans show it literally reduces activity in the amygdala, the brain\'s alarm system.' },
{ theme:'amber',  cat:'Movement',      eyebrow:'Light activity',      icon:'ph-sneaker-move',       headline:'Take the <em>long way around</em>',                           body:'Skip the nearest restroom or elevator — take the longer route instead. <strong>Those extra steps add up fast</strong> and mid-day movement genuinely shifts your energy and mood.',   fact:'Walking just 10 extra minutes a day has been shown to reduce risk of heart disease, improve sleep quality, and boost afternoon energy levels.' },
{ theme:'mint',   cat:'Stress relief', eyebrow:'Release tension',     icon:'ph-leaf',               headline:'Tense everything up — <em>then let it all go</em>',           body:'Squeeze a muscle group tightly for 5 seconds, then release completely. Start at your toes and work upward. <strong>You\'ll uncover tension you didn\'t know you were holding.</strong>',   fact:'Progressive muscle relaxation was developed in the 1920s and remains one of the most clinically proven techniques for reducing physical stress.' },
{ theme:'violet', cat:'Sleep',         eyebrow:'Rest better',         icon:'ph-moon',               headline:'The hour before bed <em>sets the whole night up</em>',        body:'Dim your lights and step away from screens to signal wind-down time. <strong>Even 30 minutes makes a measurable difference</strong> in sleep quality and how you feel tomorrow.',   fact:'Blue light from screens suppresses melatonin production for up to 3 hours — making it significantly harder for your brain to wind down.' },
{ theme:'cyan',   cat:'Connection',    eyebrow:'Social wellness',     icon:'ph-chat-circle-dots',   headline:'A quick check-in <em>matters more than you think</em>',       body:'A two-minute "how\'s your day going?" can <strong>genuinely boost your mood and reduce feelings of isolation.</strong> Real connection doesn\'t need to be deep — it just needs to happen.',   fact:'Workplace loneliness affects nearly 40% of employees and has the same health impact as smoking 15 cigarettes a day, according to researchers.' },
{ theme:'coral',  cat:'Nutrition',     eyebrow:'Fuel right',          icon:'ph-apple',              headline:'Reach for something <em>real</em> this afternoon',            body:'Fruit, nuts, or yogurt give you steady energy instead of a spike and crash. <strong>When the 2pm slump hits, what you reach for genuinely matters.</strong> Your body will feel the difference.',   fact:'The 2-3pm energy dip is a biological rhythm, not a willpower problem. What you eat at lunch has a direct impact on how deep that dip gets.' },
{ theme:'amber',  cat:'Focus',         eyebrow:'Work smarter',        icon:'ph-target',             headline:'Three things. <em>Just three.</em>',                          body:'Instead of an overwhelming list, <strong>pick the 3 things that truly matter today.</strong> When those are done, everything else is a bonus. Less stress, more satisfaction.',   fact:'Decision fatigue is real — the more choices you make during a day, the worse your judgment gets. Limiting your task list protects mental energy.' },
{ theme:'mint',   cat:'Wrist care',    eyebrow:'Stretch',             icon:'ph-hand-waving',        headline:'Your wrists are <em>working overtime</em>',                   body:'Extend one arm out, gently bend the hand back, hold 15 seconds. Then switch. <strong>Do this a few times throughout the day</strong> — it prevents strain that builds up quietly from typing.',   fact:'The average office worker makes thousands of repetitive finger and wrist movements daily — small stretches go a long way in preventing strain.' },
{ theme:'violet', cat:'Mindfulness',   eyebrow:'One minute reset',    icon:'ph-sparkle',            headline:'Sixty seconds. <em>Eyes closed. Just breathe.</em>',          body:'Set a timer for one minute. Close your eyes and notice your breathing — in and out, without changing anything. <strong>That one minute of stillness can reset your mood.</strong>',   fact:'Even a single minute of focused breathing has been shown to lower cortisol levels and shift your nervous system from reactive to responsive.' },
{ theme:'cyan',   cat:'Micro break',   eyebrow:'Get up',              icon:'ph-arrow-fat-up',       headline:'Stand up — <em>right now, seriously</em>',                    body:'Long stretches of sitting increase fatigue and stiffness more than most people realize. <strong>Standing for just 2 minutes gets your blood moving.</strong> Throw in a few calf raises.',   fact:'Sitting for more than 6 hours a day is linked to increased anxiety and depression risk, independent of how much you exercise otherwise.' },
{ theme:'rose',   cat:'Boundaries',    eyebrow:'Protect your energy', icon:'ph-shield-check',       headline:'Saying no <em>is a complete sentence</em>',                   body:'Setting limits on your time and energy isn\'t selfish — it\'s healthy. <strong>"I can\'t take that on right now" is enough.</strong> Protecting your bandwidth protects your work quality too.',   fact:'People who set clear work boundaries report lower burnout, higher job satisfaction, and better relationships with colleagues and managers.' },
{ theme:'amber',  cat:'Screen health', eyebrow:'Easy on the eyes',    icon:'ph-monitor',            headline:'Your screen is probably <em>way too bright</em>',             body:'If your screen is brighter than the room around you, your eyes are straining all day. <strong>Match your brightness to your environment</strong> and you\'ll notice less fatigue by end of day.',   fact:'Computer Vision Syndrome affects 50-90% of screen workers — but most cases are easily prevented with small, consistent daily adjustments.' },
{ theme:'mint',   cat:'Fresh air',     eyebrow:'Step outside',        icon:'ph-tree',               headline:'Even <em>five minutes outside</em> changes everything',       body:'Step outside between meetings — no phone, no agenda. <strong>Natural light and fresh air reset your focus faster than caffeine does.</strong> Your brain treats it like a tiny vacation.',   fact:'Just 5 minutes of outdoor time has been shown to improve mood and self-esteem — with the biggest gains happening in the first few minutes.' },
{ theme:'rose',   cat:'Gratitude',     eyebrow:'Shift your mindset',  icon:'ph-heart',              headline:'Name <em>three good things</em> from today',                  body:'Before you wrap up, jot down three things that went well — big or small. <strong>Training your brain to notice wins changes how you experience the day.</strong> It takes under a minute.',   fact:'Studies show people who write down 3 good things daily for two weeks report increased happiness levels that last up to six months later.' },
{ theme:'violet', cat:'Digital detox', eyebrow:'Quiet the noise',     icon:'ph-bell-slash',         headline:'Turn off <em>just one notification</em>',                     body:'Every ping pulls your focus and raises your stress baseline. <strong>Silence the noisiest app on your phone right now.</strong> You\'ll feel the difference within an hour.',   fact:'It takes an average of 23 minutes to fully refocus after a single interruption — and most workers get interrupted every 6 minutes.' },

var current = 0;

function getSavedTip() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return 0;
    var data = JSON.parse(raw);
    var elapsed = Date.now() - data.savedAt;
    return (data.index + Math.floor(elapsed / INTERVAL)) % tips.length;
  } catch(e) { return 0; }
}
function saveTip(idx) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ index:idx, savedAt:Date.now() })); } catch(e) {}
}
function buildDots() {
  var wrap = document.getElementById('dotRow');
  wrap.innerHTML = '';
  tips.forEach(function(_, i) {
    var d = document.createElement('div');
    d.className = 'dot'+(i===0?' active':'');
    wrap.appendChild(d);
  });
}
function updateDots(idx) {
  document.querySelectorAll('.dot').forEach(function(d,i) {
    d.className = 'dot'+(i===idx?' active':i<idx?' done':'');
  });
}
function applyTheme(name) {
  var a = ACCENTS[name]; var c = a.color;
  document.getElementById('progFill').style.background = c;
  document.getElementById('chalkDash').style.background = c;
  document.getElementById('chalkDash').style.boxShadow = '0 0 6px '+a.glow;
  document.getElementById('chalkRule').style.background = c;
  document.getElementById('chalkRule').style.boxShadow = '0 0 8px '+a.glow;
  document.getElementById('chipIcon').style.color = c;
  document.getElementById('cardIcon').style.color = c;
  document.getElementById('cardIcon').style.filter = 'drop-shadow(0 0 8px '+a.glow+')';
  document.getElementById('leftEm').style.color = c;
  document.getElementById('leftEm').style.textDecorationColor = a.glow;
  document.querySelectorAll('.mini-chip-val').forEach(function(el){ el.style.color=c; el.style.textShadow='0 0 8px '+a.glow; });
  document.querySelectorAll('.dot.active').forEach(function(el){ el.style.background=c; });
  document.querySelectorAll('#headline em').forEach(function(el){ el.style.color=c; el.style.textShadow='0 0 12px '+a.glow; });
  document.getElementById('dykRow').style.borderLeftColor = c;
  document.getElementById('dykLabel').style.color = c;
}
function startBar() {
  var fill = document.getElementById('progFill');
  fill.style.transition = 'none'; fill.style.width = '0%';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){
    fill.style.transition = 'width '+INTERVAL+'ms linear, background 0.7s';
    fill.style.width = '100%';
  }); });
}
function showTip(idx) {
  var tc = document.getElementById('tipContent');
  tc.classList.add('out');
  setTimeout(function() {
    var t = tips[idx];
    document.getElementById('headline').innerHTML = t.headline;
    document.getElementById('bodyText').innerHTML = t.body;
    document.getElementById('eyebrowText').textContent = t.eyebrow;
    document.getElementById('chipLabel').textContent = t.cat;
    document.getElementById('cardCat').textContent = t.cat;
    document.getElementById('watermark').textContent = String(idx+1).padStart(2,'0');
    document.getElementById('statNum').textContent = String(idx+1).padStart(2,'0');
    document.getElementById('dykText').textContent = t.fact;
    ['chipIcon','cardIcon'].forEach(function(id){ document.getElementById(id).className='ph '+t.icon; });
    applyTheme(t.theme);
    updateDots(idx);
    saveTip(idx);
    startBar();
    tc.classList.remove('out'); tc.classList.add('in');
    requestAnimationFrame(function(){ requestAnimationFrame(function(){ tc.classList.remove('in'); }); });
  }, 400);
}

buildDots();
current = getSavedTip();
showTip(current);
setInterval(function(){ current=(current+1)%tips.length; showTip(current); }, INTERVAL);
</script>
